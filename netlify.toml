[build]
  command = "npm run build"
  publish = "dist"
  functions = "backend/src/functions"

[functions]
  external_node_modules = ["mongoose", "bcryptjs", "jsonwebtoken"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
